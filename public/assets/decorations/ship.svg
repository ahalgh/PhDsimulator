<svg xmlns="http://www.w3.org/2000/svg" width="64" height="96" viewBox="0 0 64 96">
  <!-- Shadow on water -->
  <ellipse cx="32" cy="90" rx="24" ry="6" fill="rgba(0,0,0,0.2)"/>
  <!-- Hull -->
  <path d="M8,78 Q6,68 14,58 L50,58 Q58,68 56,78 Z" fill="#5D4037"/>
  <path d="M10,76 Q8,68 15,59 L32,59 Q28,68 26,76 Z" fill="#4E342E" opacity="0.5"/>
  <!-- Hull stripe -->
  <line x1="10" y1="72" x2="54" y2="72" stroke="#8D6E63" stroke-width="1.5"/>
  <!-- Deck -->
  <rect x="14" y="56" width="36" height="4" fill="#8D6E63" rx="1"/>
  <!-- Mast -->
  <line x1="32" y1="16" x2="32" y2="56" stroke="#4E342E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sail -->
  <path d="M32,18 L52,38 L32,52 Z" fill="#ECEFF1" opacity="0.95"/>
  <path d="M32,18 L52,38 L32,52 Z" fill="none" stroke="#B0BEC5" stroke-width="0.5"/>
  <!-- Sail shadow fold -->
  <path d="M32,30 L46,38 L32,46 Z" fill="rgba(0,0,0,0.05)"/>
  <!-- Flag -->
  <polygon points="32,16 32,10 42,13" fill="#FFD700"/>
  <!-- Crow's nest -->
  <rect x="28" y="20" width="8" height="3" fill="#6D4C41" rx="0.5"/>
  <!-- Porthole -->
  <circle cx="24" cy="66" r="2.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="24" cy="66" r="1.5" fill="rgba(255,255,200,0.4)"/>
  <circle cx="40" cy="66" r="2.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="40" cy="66" r="1.5" fill="rgba(255,255,200,0.4)"/>
  <!-- Bowsprit -->
  <line x1="14" y1="58" x2="6" y2="52" stroke="#4E342E" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Water line shimmer -->
  <ellipse cx="32" cy="80" rx="20" ry="3" fill="rgba(41,128,185,0.15)"/>
</svg>
