  <circle cx="32" cy="2" r="2" fill="#FFD700"/>
  <!-- Left side tower -->
  <polygon points="8,74 18,68 18,34 8,40" fill="rgb(66,88,97)"/>
  <polygon points="6,40 13,30 20,34" fill="rgb(96,115,124)"/>
  <polygon points="13,30 20,34 20,32 13,28" fill="#78909C"/>
  <circle cx="13" cy="27" r="1.5" fill="#FFD700" opacity="0.8"/>
  <rect x="11" y="52" width="3" height="4" fill="#FFD700" opacity="0.8" rx="0.5"/>
  <rect x="11" y="62" width="3" height="4" fill="#FFD700" opacity="0.8" rx="0.5"/>
  <!-- Right side tower -->
  <polygon points="44,68 56,74 56,40 44,34" fill="#607D8B"/>
  <polygon points="42,34 49,30 58,40" fill="rgb(96,115,124)"/>
  <polygon points="49,30 58,40 58,38 49,28" fill="#78909C"/>
  <circle cx="49" cy="27" r="1.5" fill="#FFD700" opacity="0.7"/>
  <rect x="48" y="52" width="3" height="4" fill="#FFD700" opacity="0.7" rx="0.5"/>
  <rect x="48" y="62" width="3" height="4" fill="#FFD700" opacity="0.7" rx="0.5"/>
  <!-- Central windows -->
  <rect x="24" y="70" width="4" height="5" fill="#FFD700" opacity="0.9" rx="0.5"/>
  <rect x="25" y="71" width="2" height="3" fill="rgba(255,255,200,0.5)" rx="0.3"/>
  <rect x="24" y="54" width="4" height="5" fill="#FFD700" opacity="0.85" rx="0.5"/>
  <rect x="25" y="55" width="2" height="3" fill="rgba(255,255,200,0.5)" rx="0.3"/>
  <rect x="24" y="38" width="4" height="5" fill="#FFD700" opacity="0.8" rx="0.5"/>
  <rect x="25" y="39" width="2" height="3" fill="rgba(255,255,200,0.5)" rx="0.3"/>
  <rect x="36" y="72" width="4" height="5" fill="#FFD700" opacity="0.7" rx="0.5"/>
  <rect x="37" y="73" width="2" height="3" fill="rgba(255,255,200,0.4)" rx="0.3"/>
  <rect x="36" y="56" width="4" height="5" fill="#FFD700" opacity="0.65" rx="0.5"/>
  <rect x="37" y="57" width="2" height="3" fill="rgba(255,255,200,0.4)" rx="0.3"/>
  <!-- Grand gate -->
  <rect x="34" y="76" width="8" height="8" fill="rgb(33,44,48)" rx="1.5"/>
  <rect x="35" y="77" width="6" height="7" fill="rgb(46,60,67)" rx="1"/>
  <path d="M35,77 Q38,74 41,77" fill="rgb(33,44,48)"/>
  <!-- Banner/flag -->
  <line x1="44" y1="18" x2="44" y2="6" stroke="#5D4037" stroke-width="1"/>
  <polygon points="45,6 53,9 45,12" fill="#FFD700"/>
