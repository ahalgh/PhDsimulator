<svg xmlns="http://www.w3.org/2000/svg" width="64" height="96" viewBox="0 0 64 96">
  <!-- Shadow -->
  <ellipse cx="32" cy="88" rx="21" ry="7" fill="rgba(0,0,0,0.25)"/>
  <!-- Grand castle: tall central tower, two side towers, banner (dissertation defended) -->
  <!-- Central tower left wall -->
  <polygon points="20,84 32,77 32,18 20,25" fill="rgb(58,77,85)"/>
  <!-- Central tower right wall -->
  <polygon points="32,77 44,84 44,25 32,18" fill="#546E7A"/>
  <!-- Floor lines -->
  <line x1="20" y1="68" x2="32" y2="61" stroke="rgba(0,0,0,0.07)" stroke-width="0.4"/>
  <line x1="32" y1="61" x2="44" y2="68" stroke="rgba(0,0,0,0.05)" stroke-width="0.4"/>
  <line x1="20" y1="52" x2="32" y2="45" stroke="rgba(0,0,0,0.07)" stroke-width="0.4"/>
  <line x1="32" y1="45" x2="44" y2="52" stroke="rgba(0,0,0,0.05)" stroke-width="0.4"/>
  <line x1="20" y1="36" x2="32" y2="29" stroke="rgba(0,0,0,0.07)" stroke-width="0.4"/>
  <line x1="32" y1="29" x2="44" y2="36" stroke="rgba(0,0,0,0.05)" stroke-width="0.4"/>
  <!-- Central tower pointed roof -->
  <polygon points="18,25 32,14 32,4" fill="rgb(96,115,124)"/>
  <polygon points="32,14 46,25 46,23 32,4" fill="#78909C"/>
