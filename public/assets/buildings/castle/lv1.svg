<svg xmlns="http://www.w3.org/2000/svg" width="64" height="96" viewBox="0 0 64 96">
  <!-- Shadow -->
  <ellipse cx="32" cy="88" rx="21" ry="7" fill="rgba(0,0,0,0.25)"/>
  <!-- Simple stone keep: single structure with crenellations, one gold window -->
  <!-- Left wall -->
  <polygon points="18,84 32,76 32,62 18,70" fill="rgb(58,77,85)"/>
  <!-- Right wall -->
  <polygon points="32,76 46,84 46,70 32,62" fill="#546E7A"/>
  <!-- Crenellations (left side) -->
  <rect x="18" y="67" width="3" height="4" fill="rgb(58,77,85)"/>
  <rect x="23" y="65" width="3" height="4" fill="rgb(58,77,85)"/>
  <rect x="28" y="63" width="3" height="4" fill="rgb(58,77,85)"/>
  <!-- Crenellations (right side) -->
  <rect x="33" y="63" width="3" height="4" fill="#546E7A"/>
  <rect x="38" y="65" width="3" height="4" fill="#546E7A"/>
  <rect x="43" y="67" width="3" height="4" fill="#546E7A"/>
  <!-- Stone texture lines -->
  <line x1="18" y1="77" x2="32" y2="69" stroke="rgba(0,0,0,0.07)" stroke-width="0.4"/>
  <line x1="32" y1="69" x2="46" y2="77" stroke="rgba(0,0,0,0.05)" stroke-width="0.4"/>
  <!-- Single gold window -->
  <rect x="23" y="76" width="4" height="4" fill="#FFD700" opacity="0.9" rx="0.5"/>
  <rect x="24" y="77" width="2" height="2.5" fill="rgba(255,255,200,0.5)" rx="0.3"/>
  <!-- Heavy door -->
  <rect x="36" y="77" width="6" height="7" fill="rgb(33,44,48)" rx="1"/>
  <rect x="37" y="78" width="4" height="6" fill="rgb(46,60,67)" rx="0.5"/>
  <!-- Door hardware -->
  <circle cx="40" cy="81" r="0.8" fill="#FFD700" opacity="0.6"/>
</svg>