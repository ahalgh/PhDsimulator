<svg xmlns="http://www.w3.org/2000/svg" width="64" height="96" viewBox="0 0 64 96">
  <!-- Shadow -->
  <ellipse cx="32" cy="88" rx="21" ry="7" fill="rgba(0,0,0,0.25)"/>
  <!-- Tiny reading nook: small hut with thatched roof -->
  <!-- Left wall -->
  <polygon points="18,84 32,76 32,68 18,76" fill="rgb(97,73,14)"/>
  <!-- Right wall -->
  <polygon points="32,76 46,84 46,76 32,68" fill="#8B6914"/>
  <!-- Thatched roof left -->
  <polygon points="15,76 32,66 32,62 15,72" fill="#8D6E63"/>
  <!-- Thatched roof right -->
  <polygon points="32,66 49,76 49,72 32,62" fill="#6D4C41"/>
  <!-- Roof ridge thatch lines -->
  <line x1="17" y1="74" x2="32" y2="64" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
  <line x1="32" y1="64" x2="47" y2="74" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>
  <!-- Single arched window (left wall) -->
  <rect x="23" y="78" width="5" height="4" fill="#FFD700" opacity="0.9" rx="1.5"/>
  <rect x="24" y="79" width="3" height="2.5" fill="rgba(255,255,200,0.5)" rx="1"/>
  <!-- Door -->
  <rect x="36" y="78" width="5" height="6" fill="rgb(55,42,8)" rx="0.5"/>
  <rect x="37" y="79" width="3" height="5" fill="rgb(76,57,11)" rx="0.3"/>
  <!-- Small book shape on windowsill -->
  <rect x="24" y="77" width="3" height="1.5" fill="#B71C1C" rx="0.2"/>
</svg>