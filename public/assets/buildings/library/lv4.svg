<svg xmlns="http://www.w3.org/2000/svg" width="64" height="96" viewBox="0 0 64 96">
  <!-- Shadow -->
  <ellipse cx="32" cy="88" rx="21" ry="7" fill="rgba(0,0,0,0.25)"/>
  <!-- Grand library: columned entrance, rose window, stone facade -->
  <!-- Left wall -->
  <polygon points="14,84 32,74 32,24 14,34" fill="rgb(97,73,14)"/>
  <!-- Right wall -->
  <polygon points="32,74 50,84 50,34 32,24" fill="#8B6914"/>
  <!-- Floor lines -->
  <line x1="14" y1="68" x2="32" y2="58" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
  <line x1="32" y1="58" x2="50" y2="68" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>
  <line x1="14" y1="52" x2="32" y2="42" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
  <line x1="32" y1="42" x2="50" y2="52" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>
  <!-- Columned entrance (left side pillars) -->
  <rect x="17" y="72" width="2" height="12" fill="rgb(120,90,20)" rx="0.5"/>
  <rect x="24" y="69" width="2" height="12" fill="rgb(120,90,20)" rx="0.5"/>
  <!-- Column caps -->
  <rect x="16" y="71" width="4" height="1.5" fill="rgb(140,105,25)" rx="0.3"/>
  <rect x="23" y="68" width="4" height="1.5" fill="rgb(140,105,25)" rx="0.3"/>
  <!-- Peaked roof -->
  <polygon points="11,34 32,22 32,14 11,26" fill="#8D6E63"/>
  <polygon points="32,22 53,34 53,26 32,14" fill="#6D4C41"/>
  <!-- Rose window at top (left wall) -->
  <circle cx="24" cy="40" r="5" fill="#B71C1C" opacity="0.8"/>
  <circle cx="24" cy="40" r="3.5" fill="#FFD700" opacity="0.4"/>
  <circle cx="24" cy="40" r="1.5" fill="rgba(255,255,200,0.6)"/>
  <!-- Second floor windows (left) -->
  <rect x="19" y="54" width="4" height="5" fill="#FFD700" opacity="0.9" rx="1.5"/>
  <rect x="20" y="55" width="2" height="3.5" fill="rgba(255,255,200,0.5)" rx="0.8"/>
  <rect x="26" y="51" width="4" height="5" fill="#FFD700" opacity="0.9" rx="1.5"/>
  <rect x="27" y="52" width="2" height="3.5" fill="rgba(255,255,200,0.5)" rx="0.8"/>
  <!-- Right wall windows -->
  <rect x="37" y="76" width="4" height="5" fill="#FFD700" opacity="0.7" rx="1.5"/>
  <rect x="38" y="77" width="2" height="3.5" fill="rgba(255,255,200,0.4)" rx="0.8"/>
  <rect x="43" y="74" width="4" height="5" fill="#FFD700" opacity="0.7" rx="1.5"/>
  <rect x="44" y="75" width="2" height="3.5" fill="rgba(255,255,200,0.4)" rx="0.8"/>
  <rect x="37" y="60" width="4" height="5" fill="#FFD700" opacity="0.65" rx="1.5"/>
  <rect x="38" y="61" width="2" height="3.5" fill="rgba(255,255,200,0.4)" rx="0.8"/>
  <rect x="43" y="58" width="4" height="5" fill="#FFD700" opacity="0.65" rx="1.5"/>
  <rect x="44" y="59" width="2" height="3.5" fill="rgba(255,255,200,0.4)" rx="0.8"/>
  <rect x="37" y="44" width="4" height="5" fill="#FFD700" opacity="0.6" rx="1.5"/>
  <rect x="38" y="45" width="2" height="3.5" fill="rgba(255,255,200,0.4)" rx="0.8"/>
  <!-- Roof ornament -->
  <polygon points="30,15 34,15 32,10" fill="#5D4037"/>
  <circle cx="32" cy="9" r="2.5" fill="#FFD700"/>
  <!-- Grand door -->
  <rect x="34" y="72" width="8" height="10" fill="rgb(55,42,8)" rx="1.5"/>
  <rect x="35" y="73" width="6" height="9" fill="rgb(76,57,11)" rx="1"/>
  <!-- Door arch -->
  <path d="M35,73 Q38,70 41,73" fill="rgb(55,42,8)"/>
</svg>