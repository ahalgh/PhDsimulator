<svg xmlns="http://www.w3.org/2000/svg" width="64" height="96" viewBox="0 0 64 96">
  <!-- Shadow -->
  <ellipse cx="32" cy="88" rx="21" ry="7" fill="rgba(0,0,0,0.25)"/>
  <!-- Small library: stone walls, peaked roof, two arched windows, lantern -->
  <!-- Left wall -->
  <polygon points="16,84 32,75 32,60 16,69" fill="rgb(97,73,14)"/>
  <!-- Right wall -->
  <polygon points="32,75 48,84 48,69 32,60" fill="#8B6914"/>
  <!-- Stone detail -->
  <line x1="16" y1="77" x2="32" y2="68" stroke="rgba(0,0,0,0.08)" stroke-width="0.4"/>
  <line x1="32" y1="68" x2="48" y2="77" stroke="rgba(0,0,0,0.06)" stroke-width="0.4"/>
  <!-- Peaked roof left -->
  <polygon points="13,69 32,58 32,52 13,63" fill="#8D6E63"/>
  <!-- Peaked roof right -->
  <polygon points="32,58 51,69 51,63 32,52" fill="#6D4C41"/>
  <!-- Roof cap -->
  <polygon points="30,53 34,53 32,49" fill="#5D4037"/>
  <!-- Two arched windows (left wall) -->
  <rect x="20" y="74" width="4" height="5" fill="#FFD700" opacity="0.9" rx="1.5"/>
  <rect x="21" y="75" width="2" height="3.5" fill="rgba(255,255,200,0.5)" rx="0.8"/>
  <rect x="27" y="72" width="4" height="5" fill="#FFD700" opacity="0.85" rx="1.5"/>
  <rect x="28" y="73" width="2" height="3.5" fill="rgba(255,255,200,0.5)" rx="0.8"/>
  <!-- Window (right wall) -->
  <rect x="37" y="76" width="4" height="5" fill="#FFD700" opacity="0.7" rx="1.5"/>
  <rect x="38" y="77" width="2" height="3.5" fill="rgba(255,255,200,0.4)" rx="0.8"/>
  <!-- Door -->
  <rect x="42" y="77" width="5" height="7" fill="rgb(55,42,8)" rx="0.5"/>
  <rect x="43" y="78" width="3" height="6" fill="rgb(76,57,11)" rx="0.3"/>
  <!-- Lantern on wall -->
  <rect x="14" y="71" width="2" height="3" fill="#5D4037" rx="0.3"/>
  <circle cx="15" cy="70" r="1.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="15" cy="70" r="2.5" fill="#FFD700" opacity="0.15"/>
</svg>