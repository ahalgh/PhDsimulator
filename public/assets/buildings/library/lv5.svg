<svg xmlns="http://www.w3.org/2000/svg" width="64" height="96" viewBox="0 0 64 96">
  <!-- Shadow -->
  <ellipse cx="32" cy="88" rx="21" ry="7" fill="rgba(0,0,0,0.25)"/>
  <!-- Magnificent library: red dome, golden spire, columned portico, stained glass, flag -->
  <!-- Left wall -->
  <polygon points="13,84 32,74 32,10 13,20" fill="rgb(97,73,14)"/>
  <!-- Right wall -->
  <polygon points="32,74 51,84 51,20 32,10" fill="#8B6914"/>
  <!-- Floor lines -->
  <line x1="13" y1="68" x2="32" y2="58" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
  <line x1="32" y1="58" x2="51" y2="68" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>
  <line x1="13" y1="52" x2="32" y2="42" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
  <line x1="32" y1="42" x2="51" y2="52" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>
  <line x1="13" y1="36" x2="32" y2="26" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
  <line x1="32" y1="26" x2="51" y2="36" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>
  <!-- Columned portico (left wall) -->
  <rect x="15" y="72" width="2" height="12" fill="rgb(120,90,20)" rx="0.5"/>
  <rect x="21" y="69" width="2" height="12" fill="rgb(120,90,20)" rx="0.5"/>
  <rect x="27" y="66" width="2" height="12" fill="rgb(120,90,20)" rx="0.5"/>
  <!-- Column caps -->
  <rect x="14" y="71" width="4" height="1.5" fill="rgb(140,105,25)" rx="0.3"/>
  <rect x="20" y="68" width="4" height="1.5" fill="rgb(140,105,25)" rx="0.3"/>
  <rect x="26" y="65" width="4" height="1.5" fill="rgb(140,105,25)" rx="0.3"/>
  <!-- Red dome -->
  <ellipse cx="32" cy="7" rx="14" ry="18" fill="#B71C1C"/>
  <ellipse cx="29" cy="7" rx="12.5" ry="17" fill="rgb(155,23,23)"/>
  <!-- Dome highlight -->
  <ellipse cx="26" cy="2" rx="4" ry="8" fill="rgba(200,50,50,0.3)"/>
  <!-- Golden spire -->
  <line x1="32" y1="-10" x2="32" y2="-22" stroke="#FFD700" stroke-width="1.5"/>
  <circle cx="32" cy="-23" r="2" fill="#FFD700"/>
  <!-- Stained glass windows (large, left wall) -->
  <rect x="18" y="44" width="5" height="7" fill="#B71C1C" opacity="0.8" rx="2"/>
  <rect x="19" y="45" width="3" height="5" fill="#FFD700" opacity="0.5" rx="1.2"/>
  <rect x="26" y="40" width="5" height="7" fill="#B71C1C" opacity="0.8" rx="2"/>
  <rect x="27" y="41" width="3" height="5" fill="#FFD700" opacity="0.5" rx="1.2"/>
  <!-- Second floor windows (left) -->
  <rect x="19" y="56" width="4" height="5" fill="#FFD700" opacity="0.9" rx="1.5"/>
  <rect x="20" y="57" width="2" height="3.5" fill="rgba(255,255,200,0.5)" rx="0.8"/>
  <rect x="26" y="53" width="4" height="5" fill="#FFD700" opacity="0.9" rx="1.5"/>
  <rect x="27" y="54" width="2" height="3.5" fill="rgba(255,255,200,0.5)" rx="0.8"/>
  <!-- Right wall windows (three floors) -->
  <rect x="37" y="76" width="4" height="5" fill="#FFD700" opacity="0.7" rx="1.5"/>
  <rect x="38" y="77" width="2" height="3.5" fill="rgba(255,255,200,0.4)" rx="0.8"/>
  <rect x="43" y="74" width="4" height="5" fill="#FFD700" opacity="0.7" rx="1.5"/>
  <rect x="44" y="75" width="2" height="3.5" fill="rgba(255,255,200,0.4)" rx="0.8"/>
  <rect x="37" y="60" width="4" height="5" fill="#FFD700" opacity="0.65" rx="1.5"/>
  <rect x="38" y="61" width="2" height="3.5" fill="rgba(255,255,200,0.4)" rx="0.8"/>
  <rect x="43" y="58" width="4" height="5" fill="#FFD700" opacity="0.65" rx="1.5"/>
  <rect x="44" y="59" width="2" height="3.5" fill="rgba(255,255,200,0.4)" rx="0.8"/>
  <rect x="37" y="44" width="4" height="5" fill="#FFD700" opacity="0.6" rx="1.5"/>
  <rect x="38" y="45" width="2" height="3.5" fill="rgba(255,255,200,0.4)" rx="0.8"/>
  <rect x="43" y="42" width="4" height="5" fill="#FFD700" opacity="0.6" rx="1.5"/>
  <rect x="44" y="43" width="2" height="3.5" fill="rgba(255,255,200,0.4)" rx="0.8"/>
  <!-- Grand arched entrance -->
  <rect x="34" y="72" width="9" height="11" fill="rgb(55,42,8)" rx="2"/>
  <rect x="35.5" y="73" width="6" height="10" fill="rgb(76,57,11)" rx="1.5"/>
  <path d="M35.5,73 Q38.5,69 41.5,73" fill="rgb(55,42,8)"/>
  <!-- Flag -->
  <line x1="50" y1="12" x2="50" y2="-2" stroke="#5D4037" stroke-width="1"/>
  <polygon points="51,-2 59,1 51,4" fill="#FFD700"/>
</svg>