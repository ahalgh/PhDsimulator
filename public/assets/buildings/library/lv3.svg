<svg xmlns="http://www.w3.org/2000/svg" width="64" height="96" viewBox="0 0 64 96">
  <!-- Shadow -->
  <ellipse cx="32" cy="88" rx="21" ry="7" fill="rgba(0,0,0,0.25)"/>
  <!-- Two-story library: balcony, three arched windows, ornate door -->
  <!-- Left wall -->
  <polygon points="15,84 32,75 32,44 15,53" fill="rgb(97,73,14)"/>
  <!-- Right wall -->
  <polygon points="32,75 49,84 49,53 32,44" fill="#8B6914"/>
  <!-- Floor divider -->
  <line x1="15" y1="68" x2="32" y2="59" stroke="rgba(0,0,0,0.12)" stroke-width="0.6"/>
  <line x1="32" y1="59" x2="49" y2="68" stroke="rgba(0,0,0,0.09)" stroke-width="0.6"/>
  <!-- Balcony ledge on left wall -->
  <polygon points="14,68 32,58 32,57 14,67" fill="rgb(120,90,20)"/>
  <!-- Peaked roof with steeper angle -->
  <polygon points="12,53 32,41 32,35 12,47" fill="#8D6E63"/>
  <polygon points="32,41 52,53 52,47 32,35" fill="#6D4C41"/>
  <!-- Roof ridge ornament -->
  <polygon points="30,36 34,36 32,31" fill="#5D4037"/>
  <circle cx="32" cy="30" r="2" fill="#FFD700"/>
  <!-- Ground floor windows (left) -->
  <rect x="19" y="74" width="4" height="5" fill="#FFD700" opacity="0.9" rx="1.5"/>
  <rect x="20" y="75" width="2" height="3.5" fill="rgba(255,255,200,0.5)" rx="0.8"/>
  <rect x="26" y="72" width="4" height="5" fill="#FFD700" opacity="0.9" rx="1.5"/>
  <rect x="27" y="73" width="2" height="3.5" fill="rgba(255,255,200,0.5)" rx="0.8"/>
  <!-- Second floor windows (left) -->
  <rect x="20" y="60" width="4" height="5" fill="#FFD700" opacity="0.85" rx="1.5"/>
  <rect x="21" y="61" width="2" height="3.5" fill="rgba(255,255,200,0.5)" rx="0.8"/>
  <rect x="27" y="57" width="4" height="5" fill="#FFD700" opacity="0.85" rx="1.5"/>
  <rect x="28" y="58" width="2" height="3.5" fill="rgba(255,255,200,0.5)" rx="0.8"/>
  <!-- Right wall windows -->
  <rect x="37" y="76" width="4" height="5" fill="#FFD700" opacity="0.7" rx="1.5"/>
  <rect x="38" y="77" width="2" height="3.5" fill="rgba(255,255,200,0.4)" rx="0.8"/>
  <rect x="43" y="74" width="4" height="5" fill="#FFD700" opacity="0.7" rx="1.5"/>
  <rect x="44" y="75" width="2" height="3.5" fill="rgba(255,255,200,0.4)" rx="0.8"/>
  <rect x="37" y="62" width="4" height="5" fill="#FFD700" opacity="0.65" rx="1.5"/>
  <rect x="38" y="63" width="2" height="3.5" fill="rgba(255,255,200,0.4)" rx="0.8"/>
  <!-- Ornate door -->
  <rect x="34" y="72" width="7" height="9" fill="rgb(55,42,8)" rx="1"/>
  <rect x="35" y="73" width="5" height="8" fill="rgb(76,57,11)" rx="0.5"/>
  <rect x="36" y="72" width="3" height="2" fill="#FFD700" opacity="0.3" rx="0.5"/>
</svg>