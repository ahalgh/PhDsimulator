<svg xmlns="http://www.w3.org/2000/svg" width="64" height="32" viewBox="0 0 64 32">
  <!-- Isometric dock tile -->
  <polygon points="32,-0.5 64.5,16 32,32.5 -0.5,16" fill="#795548"/>
  <!-- Darker edge shading -->
  <line x1="32" y1="1" x2="63" y2="16" stroke="#5D4037" stroke-width="0.5" opacity="0.5"/>
  <line x1="63" y1="16" x2="32" y2="31" stroke="rgba(0,0,0,0.25)" stroke-width="0.5"/>
  <line x1="32" y1="31" x2="1" y2="16" stroke="rgba(0,0,0,0.2)" stroke-width="0.5"/>
  <!-- Plank lines -->
  <line x1="20" y1="10" x2="44" y2="22" stroke="rgba(0,0,0,0.15)" stroke-width="0.8"/>
  <line x1="16" y1="12" x2="40" y2="24" stroke="rgba(0,0,0,0.12)" stroke-width="0.5"/>
  <line x1="24" y1="8" x2="48" y2="20" stroke="rgba(0,0,0,0.12)" stroke-width="0.5"/>
  <!-- Mooring post -->
  <rect x="30" y="12" width="4" height="6" fill="#5D4037" rx="0.5"/>
  <rect x="29" y="11" width="6" height="2" fill="#4E342E" rx="0.5"/>
  <!-- Rope coil -->
  <ellipse cx="38" cy="18" rx="3" ry="1.5" fill="rgba(139,115,85,0.6)" stroke="#8B7355" stroke-width="0.5"/>
</svg>
